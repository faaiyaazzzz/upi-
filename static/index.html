<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Fraud Detection</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>UPI Fraud Detection</h1>
            <p>Predict whether a transaction is legitimate or fraudulent.</p>
        </header>

        <main>
            <form id="predictionForm">
                <div class="form-group">
                    <label for="transaction_type">Transaction Type</label>
                    <select id="transaction_type" name="transaction_type" required>
                        <option value="">Select Type</option>
                        <option value="BILL_PAYMENT">Bill Payment</option>
                        <option value="RECHARGE">Recharge</option>
                        <option value="P2P">Peer-to-Peer (P2P)</option>
                        <option value="P2M">Peer-to-Merchant (P2M)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="merchant">Merchant</label>
                    <select id="merchant" name="merchant" required>
                        <option value="">Select Merchant</option>
                        <option value="Swiggy">Swiggy</option>
                        <option value="GooglePay">GooglePay</option>
                        <option value="PhonePe">PhonePe</option>
                        <option value="Zomato">Zomato</option>
                        <option value="Paytm">Paytm</option>
                        <option value="None">None</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="amount">Transaction Amount (₹)</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0" placeholder="e.g. 500.00" required>
                </div>

                <div class="form-group">
                    <label for="device">Device Type</label>
                    <select id="device" name="device" required>
                        <option value="">Select Device</option>
                        <option value="iOS">iOS</option>
                        <option value="Android">Android</option>
                        <option value="Web">Web</option>
                        <option value="Unknown">Unknown</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="hour_of_day">Hour of Day (0-23)</label>
                    <input type="number" id="hour_of_day" name="hour_of_day" min="0" max="23" placeholder="e.g. 14" required>
                </div>

                <button type="submit" id="predictBtn">Predict Fraud Status</button>
            </form>

            <div id="result" class="result-container hidden">
                <h3>Prediction Result</h3>
                <div id="resultContent">
                    <p id="statusText"></p>
                    <div class="probability-bar">
                        <div id="probabilityFill" class="probability-fill"></div>
                    </div>
                    <p id="probabilityText"></p>
                </div>
            </div>

            <section class="history-section">
                <h3>Real-time Transaction History</h3>
                <div class="table-responsive">
                    <table id="historyTable">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Merchant</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <!-- Rows will be added here dynamically -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 UPI Fraud Detection System</p>
        </footer>
    </div>
    <script src="static/script.js"></script>
</body>
</html>
